<!DOCTYPE html>
<html>
<head>
<style>

/* Universal Selector */
* {
    margin: 0;
    padding: 0;
}

/* Element Selector */
h1 {
    color: blue;
}

/* ID Selector */
#mainHeading {
    background-color: yellow;
}

/* Class Selector */
.text {
    color: green;
    font-size: 20px;
}

/* Group Selector */
h2, p {
    border: 2px solid black;
    padding: 10px;
}

</style>
</head>
<body>

<h1 id="mainHeading">Welcome to CSS</h1>

<h2>Group Selector Example</h2>

<p class="text">
    This paragraph uses Class Selector and Group Selector.
</p>

<p>
    This paragraph uses Group Selector.
</p>

</body>
</html>
