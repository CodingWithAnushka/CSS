<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anu's Kitchen</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>🍲 Anu's Kitchen</h1>
    <div>
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#order">Order</a>
        <a href="#contact">Contact</a>
    </div>
</div>

<!-- HERO -->
<div class="hero" id="home">
    <h2>Delicious Homemade Food 🍛</h2>
    <p>Fresh • Tasty • Hygienic</p>
</div>

<!-- MENU -->
<div class="menu" id="menu">
    <h2>Menu</h2>

    <div class="box-container">
        <div class="box">🍛 Veg Thali</div>
        <div class="box">🍔 Burger</div>
        <div class="box">🍕 Pizza</div>
        <div class="box">🍜 Noodles</div>
    </div>
</div>

<!-- ORDER FORM -->
<div class="order" id="order">
    <h2>Place Order</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="text" placeholder="Food Item" required>
        <input type="number" placeholder="Phone Number" required>
        <button type="submit">Order Now</button>
    </form>
</div>

<!-- CONTACT -->
<div class="contact" id="contact">
    <h2>Contact</h2>
    <p>📞 +91 99999999999</p>
    <p>📍 Anu's Kitchen, Maharashtra</p>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/919876543210" target="_blank">
💬
</a>

</body>
</html>
