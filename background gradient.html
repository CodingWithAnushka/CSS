<!DOCTYPE html>
<html>
<head>
<style>

/* Linear Gradient */
.linear {
    height: 150px;
    background: linear-gradient(to right, red, yellow);
}

/* Vertical Gradient */
.vertical {
    height: 150px;
    background: linear-gradient(to bottom, blue, white);
}

/* Radial Gradient */
.radial {
    height: 150px;
    background: radial-gradient(circle, pink, purple);
}

/* Conic Gradient */
.conic {
    height: 150px;
    background: conic-gradient(red, yellow, green, blue, red);
}

div {
    margin: 15px 0;
    text-align: center;
    font-size: 20px;
    line-height: 150px;
    color: black;
    font-weight: bold;
}

</style>
</head>
<body>

<div class="linear">Linear Gradient</div>

<div class="vertical">Vertical Gradient</div>

<div class="radial">Radial Gradient</div>

<div class="conic">Conic Gradient</div>

</body>
</html>
