<!DOCTYPE html>
<html>
<head>
<style>

/* RGB */
.rgb {
    background-color: rgb(255, 0, 0);
    color: white;
    padding: 10px;
}

/* RGBA */
.rgba {
    background-color: rgba(0, 0, 255, 0.5);
    color: black;
    padding: 10px;
}

/* HEX */
.hex {
    background-color: #00FF00;
    color: black;
    padding: 10px;
}

/* HSL */
.hsl {
    background-color: hsl(60, 100%, 50%);
    color: black;
    padding: 10px;
}

/* HSLA */
.hsla {
    background-color: hsla(300, 100%, 50%, 0.5);
    color: black;
    padding: 10px;
}

</style>
</head>
<body>

<h2 class="rgb">RGB Color</h2>

<h2 class="rgba">RGBA Color</h2>

<h2 class="hex">HEX Color</h2>

<h2 class="hsl">HSL Color</h2>

<h2 class="hsla">HSLA Color</h2>

</body>
</html>
