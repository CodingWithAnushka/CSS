<!DOCTYPE html>
<html>
<head>
<style>

/* Background Color */
.bg-color {
    background-color: lightblue;
    padding: 20px;
}

/* Background Image */
.bg-image {
    background-image: url("https://picsum.photos/800/400");
    height: 200px;
}

/* Background Repeat */
.bg-repeat {
    background-image: url("https://picsum.photos/100");
    background-repeat: repeat-x;
    height: 150px;
}

/* Background Position */
.bg-position {
    background-image: url("https://picsum.photos/100");
    background-repeat: no-repeat;
    background-position: center;
    height: 200px;
    border: 1px solid black;
}

/* Background Size */
.bg-size {
    background-image: url("https://picsum.photos/800/400");
    background-size: cover;
    height: 250px;
}

/* Background Attachment */
.bg-attachment {
    background-image: url("https://picsum.photos/800/400");
    background-attachment: fixed;
    background-size: cover;
    height: 250px;
}

/* Background Shorthand Property */
.bg-shorthand {
    background: lightgreen url("https://picsum.photos/100")
                no-repeat center/150px;
    height: 250px;
}

/* Multiple Background Images */
.bg-multiple {
    background-image:
        url("https://picsum.photos/150"),
        url("https://picsum.photos/100");
    background-repeat: no-repeat, no-repeat;
    background-position: left top, right bottom;
    height: 300px;
    border: 2px solid black;
}

</style>
</head>
<body>

<div class="bg-color">Background Color Example</div>
<br>

<div class="bg-image"></div>
<br>

<div class="bg-repeat"></div>
<br>

<div class="bg-position"></div>
<br>

<div class="bg-size"></div>
<br>

<div class="bg-attachment"></div>
<br>

<div class="bg-shorthand"></div>
<br>

<div class="bg-multiple"></div>

</body>
</html>
